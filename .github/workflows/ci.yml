name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend Tests + Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: honeymoon_hotel_finder_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/honeymoon_hotel_finder_test
      GOOGLE_MAPS_API_KEY: test_key
      RAPIDAPI_KEY: test_key

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          working-directory: backend
          bundler-cache: true

      - name: Set up database
        run: bundle exec rails db:schema:load

      - name: Download Code Climate test reporter
        working-directory: .
        run: |
          curl -L -o cc-test-reporter https://github.com/codeclimate/test-reporter/releases/download/v0.11.1/cc-test-reporter-0.11.1-linux-amd64
          chmod +x cc-test-reporter
          ./cc-test-reporter before-build
        env:
          CC_TEST_REPORTER_ID: ${{ secrets.CC_TEST_REPORTER_ID }}

      - name: Run RSpec
        run: bundle exec rspec

      - name: Upload coverage to Code Climate
        if: success()
        working-directory: .
        run: |
          ./cc-test-reporter format-coverage \
            -t simplecov \
            -o coverage/codeclimate.json \
            backend/coverage/.resultset.json \
            --prefix backend
          ./cc-test-reporter upload-coverage \
            -i coverage/codeclimate.json \
            --debug
        env:
          CC_TEST_REPORTER_ID: ${{ secrets.CC_TEST_REPORTER_ID }}

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npx vitest run

  lint:
    name: Linting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          working-directory: backend
          bundler-cache: true

      - name: RuboCop
        working-directory: backend
        run: bundle exec rubocop

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npx eslint src/